<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador JPCFIX - Versión Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JPCFIX Presupuestos">

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" href="logo.png">
    <style>
        /* Ajustes base para que no haya sombras raras */
        .no-shadow { box-shadow: none !important; border: none !important; }
        
        .hoja-a4 { 
            width: 210mm; 
            height: 296mm; 
            background-color: white; 
            position: relative; 
            margin: auto;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* La franja gris como un DIV sólido, no como degradado */
        .franja-gris {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background-color: #f3f4f6;
            z-index: 0;
        }

        .contenido-presupuesto {
            position: relative;
            z-index: 10;
            padding: 20mm;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .marca-agua { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) rotate(-45deg); 
            font-size: 130px; 
            color: rgba(0,0,0,0.03); 
            font-weight: bold; 
            pointer-events: none; 
            z-index: 5; 
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-100 py-10">

    <div class="max-w-4xl mx-auto bg-white p-6 shadow-lg mb-10 no-print">
        <h2 class="text-xl font-bold mb-4 border-b pb-2">Panel de Carga JPCFIX</h2>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="text" id="in_nombre" placeholder="Nombre del Cliente" class="border p-2 rounded" oninput="actualizar()">
            <input type="text" id="in_dir" placeholder="Dirección" class="border p-2 rounded" oninput="actualizar()">
            <input type="date" id="in_fecha" class="border p-2 rounded" oninput="actualizar()">
            <input type="text" id="in_validez" placeholder="Validez" class="border p-2 rounded" value="15 días" oninput="actualizar()">
        </div>
        
        <div id="items-container" class="mb-4 space-y-2">
            <div class="flex gap-2">
                <input type="text" placeholder="Descripción" class="flex-1 border p-2 desc" oninput="actualizar()">
                <input type="number" placeholder="Cant" class="w-20 border p-2 cant" oninput="actualizar()">
                <input type="number" placeholder="Precio" class="w-32 border p-2 precio" oninput="actualizar()">
            </div>
        </div>
        
        <button onclick="agregarFila()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">+ Agregar Item</button>
        <button onclick="generarPDF()" class="bg-green-600 text-white px-8 py-2 rounded font-bold float-right">GENERAR PDF</button>
    </div>

    <div id="area-pdf" class="hoja-a4 no-shadow">
        <div class="franja-gris"></div>
        <div class="marca-agua">JPCFIX</div>
        
        <div class="contenido-presupuesto">
            <div class="flex justify-between items-start mb-10">
                <div class="text-4xl font-black italic">JPCFIX</div>
                <div class="bg-slate-800 text-white px-8 py-2 text-lg font-bold">PRESUPUESTO</div>
            </div>

            <div class="grid grid-cols-2 border-2 border-slate-800 bg-white/80 p-4 mb-8 relative z-20">
                <div class="space-y-1">
                    <p><strong>NOMBRE:</strong> <span id="out_nombre">......................</span></p>
                    <p><strong>DIRECCIÓN:</strong> <span id="out_dir">......................</span></p>
                </div>
                <div class="text-right space-y-1">
                    <p><strong>FECHA:</strong> <span id="out_fecha">../../....</span></p>
                    <p><strong>VALIDEZ:</strong> <span id="out_validez">15 días</span></p>
                </div>
            </div>

            <table class="w-full border-collapse relative z-20">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="border border-slate-800 p-3 text-left">DESCRIPCIÓN</th>
                        <th class="border border-slate-800 p-3 w-20 text-center">UNID.</th>
                        <th class="border border-slate-800 p-3 w-28 text-center">PRECIO</th>
                        <th class="border border-slate-800 p-3 w-28 text-center">TOTAL</th>
                    </tr>
                </thead>
                <tbody id="tabla-items" class="bg-white/50">
                    </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" class="text-right p-3 font-bold">TOTAL:</td>
                        <td id="total_final" class="border-2 border-slate-800 p-3 font-bold text-center bg-white text-lg">$ 0</td>
                    </tr>
                </tfoot>
            </table>

            <div class="mt-auto flex justify-between items-end pb-10">
                <p class="text-xs italic">Forma de pago: EFECTIVO - TRANSFERENCIA</p>
                <div class="text-center">
                    <div class="border-b border-slate-800 w-40 mb-1"></div>
                    <p class="text-xs font-bold uppercase">Firma</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function agregarFila() {
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `<input type="text" placeholder="Descripción" class="flex-1 border p-2 desc" oninput="actualizar()">
                             <input type="number" placeholder="Cant" class="w-20 border p-2 cant" oninput="actualizar()">
                             <input type="number" placeholder="Precio" class="w-32 border p-2 precio" oninput="actualizar()">`;
            document.getElementById('items-container').appendChild(div);
        }

        function actualizar() {
            document.getElementById('out_nombre').innerText = document.getElementById('in_nombre').value || '................';
            document.getElementById('out_dir').innerText = document.getElementById('in_dir').value || '................';
            document.getElementById('out_fecha').innerText = document.getElementById('in_fecha').value || '../../....';
            document.getElementById('out_validez').innerText = document.getElementById('in_validez').value || '15 días';

            let totalGral = 0;
            const filas = document.querySelectorAll('#items-container > div');
            const tabla = document.getElementById('tabla-items');
            tabla.innerHTML = '';

            filas.forEach(f => {
                const d = f.querySelector('.desc').value;
                const c = parseFloat(f.querySelector('.cant').value) || 0;
                const p = parseFloat(f.querySelector('.precio').value) || 0;
                const t = c * p;
                if(d || c > 0) {
                    totalGral += t;
                    tabla.innerHTML += `<tr>
                        <td class="border border-slate-800 p-2 bg-white/80 font-medium">${d}</td>
                        <td class="border border-slate-800 p-2 text-center bg-white/80">${c}</td>
                        <td class="border border-slate-800 p-2 text-center bg-white/80">$ ${p.toLocaleString()}</td>
                        <td class="border border-slate-800 p-2 text-center bg-white/80 font-bold">$ ${t.toLocaleString()}</td>
                    </tr>`;
                }
            });
            document.getElementById('total_final').innerText = '$ ' + totalGral.toLocaleString();
        }

        function generarPDF() {
            const element = document.getElementById('area-pdf');
            const opt = {
                margin: 0,
                filename: 'Presupuesto_JPCFIX.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, logging: false, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
